name: Build Helm Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install arm64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.2'
          channel: stable
          cache: true

      - name: Install flutterpi_tool
        run: dart pub global activate flutterpi_tool

      - name: Build BoatOS
        working-directory: flutter_app
        run: |
          flutter pub get
          $HOME/.pub-cache/bin/flutterpi_tool build --arch=arm64 --cpu=generic --release

      - name: Upload app.so
        uses: actions/upload-artifact@v4
        with:
          name: app-so
          path: flutter_app/build/flutter-pi/aarch64-generic/app.so